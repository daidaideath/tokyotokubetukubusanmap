<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1419">
<title>東京特別区武三エリア 地図ビューア</title>
<style>
:root{
  --bg:#0f1419;--panel:#1a2129;--panel2:#222c36;--line:#2e3a46;
  --txt:#e6edf3;--sub:#9fb0bf;--accent:#4aa8ff;--accent2:#1f6feb;--chip:#263340;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--txt);overscroll-behavior:none}
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}
#side{width:240px;flex:0 0 240px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
#side header{padding:12px 14px;border-bottom:1px solid var(--line)}
#side h1{font-size:15px;margin:0 0 2px}
#side .sub{font-size:11px;color:var(--sub)}
#arealist{overflow:auto;flex:1;padding:6px 0}
.grp-h{font-size:11px;color:var(--sub);padding:8px 14px 4px}
.area-item{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;cursor:pointer;font-size:13.5px;border-left:3px solid transparent}
.area-item:hover{background:var(--panel2)}
.area-item.active{background:var(--accent2);border-left-color:var(--accent)}
.area-item .cnt{font-size:11px;color:var(--sub)}
.note{font-size:10.5px;color:var(--sub);padding:8px 12px;border-top:1px solid var(--line);line-height:1.5}
.note a{color:var(--accent)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
#mobarea{display:none}
.machip{font-size:13px;padding:6px 11px;border-radius:8px;background:var(--chip);color:var(--txt);border:1px solid var(--line);cursor:pointer}
.machip.active{background:var(--accent2);border-color:var(--accent);color:#fff}
.machip-h{flex-basis:100%;width:100%;font-size:11px;color:var(--sub);margin:4px 0 0}
#topbar h2{margin:0;font-size:16px;white-space:nowrap}
.badge{font-size:11px;background:var(--chip);color:var(--sub);padding:2px 8px;border-radius:10px}
#variants{display:flex;gap:6px;margin-left:auto;flex-wrap:wrap}
.vbtn{font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid var(--line);background:var(--panel2);color:var(--sub);cursor:pointer}
.vbtn.active{background:var(--accent2);color:#fff;border-color:var(--accent)}
#qwrap{padding:8px 14px;border-bottom:1px solid var(--line);background:var(--panel)}
#q{width:100%;padding:9px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--txt);font-size:15px}
#q:focus{outline:none;border-color:var(--accent)}
#content{flex:1;display:flex;overflow:hidden}
#mapcol{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
#mapwrap{flex:1;position:relative;overflow:hidden;background:#0b0f14;display:flex;align-items:center;justify-content:center}
#mapimg{max-width:100%;max-height:100%;cursor:zoom-in;transition:transform .05s linear;user-select:none;-webkit-user-drag:none}
#maphint{position:absolute;bottom:8px;left:10px;font-size:10.5px;color:var(--sub);background:rgba(0,0,0,.5);padding:4px 8px;border-radius:6px}
#zoomctl{position:absolute;top:8px;right:10px;display:flex;gap:6px}
.zb{width:34px;height:34px;border-radius:7px;border:1px solid var(--line);background:rgba(20,26,32,.85);color:var(--txt);font-size:18px;cursor:pointer;line-height:1}
#maploading{position:absolute;color:var(--sub);font-size:13px}
#readcol{width:330px;flex:0 0 330px;display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
#gyobar{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;border-bottom:1px solid var(--line)}
.gyob{font-size:12px;padding:4px 9px;border-radius:6px;background:var(--chip);color:var(--sub);cursor:pointer}
.gyob.active{background:var(--accent);color:#06243f}
#readlist{overflow:auto;flex:1;padding:4px 0}
.gyo-label{font-size:11px;color:var(--accent);padding:8px 14px 3px;font-weight:bold}
.row{display:flex;justify-content:space-between;padding:7px 14px;font-size:14px;border-bottom:1px solid #20272f}
.row .ko{font-weight:600}
.row .yo{color:var(--sub);font-size:12.5px;margin-left:8px}
mark{background:#ffd54a;color:#000;border-radius:2px;padding:0 1px}
#results{position:fixed;inset:0;background:var(--bg);z-index:30;overflow:auto;display:none;padding:14px 16px}
#results h3{margin:0 0 10px;font-size:15px}
.rrow{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--line);cursor:pointer;font-size:15px}
.rrow:hover{background:var(--panel2)}
.rarea{font-size:11px;background:var(--chip);color:var(--sub);padding:2px 8px;border-radius:10px;flex:0 0 auto}
.ryo{color:var(--sub);font-size:12.5px}
#closeres{float:right;cursor:pointer;color:var(--sub);font-size:14px}
#lb{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:50;display:none;align-items:center;justify-content:center}
#lb img{max-width:98%;max-height:98%}
#lbclose{position:absolute;top:12px;right:16px;color:#fff;font-size:30px;cursor:pointer}
@media (max-width:820px){
  #app{flex-direction:column;height:auto;min-height:100dvh}
  #side{display:none}
  #mobarea{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;border-bottom:1px solid var(--line);background:var(--panel);max-height:34vh;overflow:auto}
  #topbar .badge{display:none}
  #variants{margin-left:0;width:100%;justify-content:flex-start}
  #content{flex-direction:column;overflow:visible}
  #mapcol{border-right:none;border-bottom:1px solid var(--line)}
  #mapwrap{height:46vh;flex:none}
  #readcol{width:100%;flex:none}
  #readlist{max-height:none;overflow:visible}
  #maphint{display:none}
  body{overflow:auto}
}
</style>
</head>

    <div id="arealist"></div>

  <section id="main">
    <div id="topbar">

        </div>
      </div>
      <div id="readcol">
        <div id="gyobar"></div>
        <div id="readlist"></div>
      </div>
    </div>
  </section>
</div>
<div id="results"><span id="closeres">✕ 閉じる</span><h3 id="resh"></h3><div id="reslist"></div></div>
<div id="lb"><span id="lbclose">✕</span><img id="lbimg" alt=""></div>

function buildGyobar(){const bar=$("#gyobar");bar.innerHTML="";
  const all=document.createElement("div");all.className="gyob"+(curGyo==="all"?" active":"");all.textContent="全て";all.onclick=()=>{curGyo="all";buildGyobar();renderReadings();};bar.appendChild(all);
  const present=new Set(DATA.areas[cur].gyo.map(g=>g.gyo));
  GYO_ORDER.forEach(g=>{if(!present.has(g))return;const b=document.createElement("div");b.className="gyob"+(curGyo===g?" active":"");b.textContent=g;b.onclick=()=>{curGyo=g;buildGyobar();renderReadings();};bar.appendChild(b);});}
function renderReadings(){const a=DATA.areas[cur],rl=$("#readlist");rl.innerHTML="";
  a.gyo.forEach(sec=>{if(curGyo!=="all"&&sec.gyo!==curGyo)return;
    const s=document.createElement("div");s.innerHTML='<div class="gyo-label">'+sec.gyo+'</div>';
    sec.items.forEach(it=>{const r=document.createElement("div");r.className="row";r.innerHTML='<span class="ko">'+it.k+'</span><span class="yo">'+it.y+'</span>';s.appendChild(r);});rl.appendChild(s);});}
function select(i){cur=i;curGyo="all";
  document.querySelectorAll(".area-item").forEach(e=>e.classList.toggle("active",+e.dataset.idx===i));
  document.querySelectorAll(".machip").forEach(e=>e.classList.toggle("active",+e.dataset.idx===i));
  const a=DATA.areas[i];$("#title").textContent=a.name;$("#cntbadge").textContent=a.count+"地名";
  buildVariants();loadMap();buildGyobar();renderReadings();$("#results").style.display="none";
  window.scrollTo(0,0);}
let scale=1,tx=0,ty=0,drag=false,sx,sy;const img=()=>$("#mapimg");
function apply(){img().style.transform="translate("+tx+"px,"+ty+"px) scale("+scale+")";img().style.cursor=scale>1?"grab":"zoom-in";}
function resetZoom(){scale=1;tx=0;ty=0;apply();}
$("#zin").onclick=()=>{scale=Math.min(scale*1.3,8);apply();};
$("#zout").onclick=()=>{scale=Math.max(scale/1.3,1);if(scale===1){tx=0;ty=0}apply();};
$("#zreset").onclick=resetZoom;
$("#mapwrap").addEventListener("wheel",e=>{e.preventDefault();const d=e.deltaY<0?1.15:1/1.15;scale=Math.min(Math.max(scale*d,1),8);if(scale===1){tx=0;ty=0}apply();},{passive:false});
img().addEventListener("mousedown",e=>{if(scale<=1)return;drag=true;sx=e.clientX-tx;sy=e.clientY-ty;e.preventDefault();});
window.addEventListener("mousemove",e=>{if(!drag)return;tx=e.clientX-sx;ty=e.clientY-sy;apply();});
window.addEventListener("mouseup",()=>{drag=false;});
img().addEventListener("click",()=>{if(scale>1)return;$("#lbimg").src=img().src;$("#lb").style.display="flex";});
$("#lbclose").onclick=()=>$("#lb").style.display="none";
$("#lb").onclick=e=>{if(e.target.id==="lb")$("#lb").style.display="none";};
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
function hl(t,q){if(!q)return t;try{return t.replace(new RegExp("("+esc(q)+")","gi"),"<mark>$1</mark>");}catch(e){return t;}}
$("#q").addEventListener("input",e=>{const q=e.target.value.trim();if(!q){$("#results").style.display="none";return;}
  const res=[];DATA.areas.forEach((a,ai)=>a.gyo.forEach(g=>g.items.forEach(it=>{if(it.k.includes(q)||it.y.includes(q))res.push({ai:ai,name:a.name,k:it.k,y:it.y});})));
  $("#resh").innerHTML="「"+q+"」の検索結果 <span style=\"color:var(--sub);font-size:12px\">"+res.length+"件</span>";
  const rl=$("#reslist");rl.innerHTML="";
  res.slice(0,500).forEach(r=>{const d=document.createElement("div");d.className="rrow";
    d.innerHTML='<span class="rarea">'+r.name+'</span><span>'+hl(r.k,q)+'</span><span class="ryo">'+hl(r.y,q)+'</span>';
    d.onclick=()=>{select(r.ai);$("#q").value="";$("#results").style.display="none";};rl.appendChild(d);});
  if(!res.length)rl.innerHTML='<div style="color:var(--sub);padding:14px">該当なし</div>';
  $("#results").style.display="block";});
$("#closeres").onclick=()=>$("#results").style.display="none";
buildSidebar();select(0);
</script>
</body>
</html>
